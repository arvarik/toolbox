services:
  toolbox:
    image: ghcr.io/arvarik/toolbox:latest
    build:
      context: .
    container_name: toolbox
    restart: unless-stopped
    ports:
      - "${PORT:-3100}:3100"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3100
      - DB_PATH=/app/data/toolbox.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "local"
      options:
        max-size: "10m"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
