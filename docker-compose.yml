services:
  toolbox:
    build: .
    container_name: toolbox
    restart: unless-stopped
    ports:
      - "${PORT:-3100}:3100"
    volumes:
      - toolbox-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3100
      - DB_PATH=/app/data/toolbox.db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  toolbox-data:
    driver: local
